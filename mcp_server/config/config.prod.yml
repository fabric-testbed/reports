# Production Configuration
# Use this for production deployment

transport:
  mode: http  # HTTP server mode
  http_host: 0.0.0.0
  http_port: 5000

api:
  base_url: http://reports-api:8080/reports  # Production Reports API
  timeout: 30
  max_retries: 5
  pool_size: 20

logging:
  level: INFO  # Standard logging (not DEBUG in production)
  format: json  # Structured JSON logging
  destination: both  # Console (for Docker) and file
  file_path: /var/log/mcp/server.log
  rotation_size: 100MB
  retention_days: 30
