# Production docker-compose — HTTP mode with Bearer-auth per request
#
# Usage:
#   docker compose up -d
#
# For local/stdio development, see docker-compose.local.yml

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabric-reports-mcp
    image: fabric-reports-mcp:latest
    restart: always
    ports:
      - "5000:5000"
    environment:
      MCP_TRANSPORT: "http"
      REPORTS_API_BASE_URL: "http://reports-api:8080/reports"
      MCP_LOGGING__LEVEL: "INFO"
      MCP_LOGGING__FORMAT: "json"
      MCP_LOGGING__DESTINATION: "both"
      MCP_LOGGING__FILE_PATH: "/var/log/mcp/server.log"
    volumes:
      - ./mcp-logs:/var/log/mcp
